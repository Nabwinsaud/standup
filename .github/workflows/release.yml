name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  ENTRY: src/index.ts
  NAME: standup

jobs:
  # ─── Run tests before building release artifacts ─────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun x tsc --noEmit

      - name: Run tests
        run: bun test

  # ─── Build binaries for all platforms ────────────────────────────
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            platform: darwin-arm64
            artifact: standup-darwin-arm64
          - target: bun-darwin-x64
            platform: darwin-x64
            artifact: standup-darwin-x64
          - target: bun-linux-arm64
            platform: linux-arm64
            artifact: standup-linux-arm64
          - target: bun-linux-x64
            platform: linux-x64
            artifact: standup-linux-x64
          - target: bun-windows-x64
            platform: windows-x64
            artifact: standup-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p dist
          bun build --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.artifact }} ${{ env.ENTRY }}

      - name: Generate checksum
        run: |
          cd dist
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256

  # ─── Create GitHub Release with all binaries ────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          echo "## Checksums" > release/CHECKSUMS.txt
          echo '```' >> release/CHECKSUMS.txt
          cat release/*.sha256 >> release/CHECKSUMS.txt
          echo '```' >> release/CHECKSUMS.txt
          ls -lh release/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "standup v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            release/standup-darwin-arm64
            release/standup-darwin-arm64.sha256
            release/standup-darwin-x64
            release/standup-darwin-x64.sha256
            release/standup-linux-arm64
            release/standup-linux-arm64.sha256
            release/standup-linux-x64
            release/standup-linux-x64.sha256
            release/standup-windows-x64.exe
            release/standup-windows-x64.exe.sha256
            release/CHECKSUMS.txt
          body: |
            ## Installation

            **Recommended:** Use the install script (auto-detects platform, no sudo):

            ```bash
            curl -fsSL https://raw.githubusercontent.com/Nabwinsaud/standup/main/install.sh | bash
            ```

            **Or manually** download the binary for your platform:

            ```bash
            mkdir -p ~/.local/bin

            # macOS (Apple Silicon)
            curl -fSL https://github.com/Nabwinsaud/standup/releases/download/${{ github.ref_name }}/standup-darwin-arm64 -o standup
            chmod +x standup && mv standup ~/.local/bin/

            # macOS (Intel)
            curl -fSL https://github.com/Nabwinsaud/standup/releases/download/${{ github.ref_name }}/standup-darwin-x64 -o standup
            chmod +x standup && mv standup ~/.local/bin/

            # Linux (x64)
            curl -fSL https://github.com/Nabwinsaud/standup/releases/download/${{ github.ref_name }}/standup-linux-x64 -o standup
            chmod +x standup && mv standup ~/.local/bin/

            # Linux (ARM64)
            curl -fSL https://github.com/Nabwinsaud/standup/releases/download/${{ github.ref_name }}/standup-linux-arm64 -o standup
            chmod +x standup && mv standup ~/.local/bin/
            ```

            Make sure `~/.local/bin` is in your `PATH`.

            For Windows, download `standup-windows-x64.exe` and add it to your PATH.

            ## Verify

            ```bash
            sha256sum -c standup-darwin-arm64.sha256
            ```
